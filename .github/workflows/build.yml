name: Build runner images

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/slamanna212/runnerimages

jobs:
  build-test:
    name: Test ${{ matrix.target }}
    runs-on: rapture-runnerimages
    strategy:
      fail-fast: false
      matrix:
        target:
          - apogee
          - matchexec
          - tonysofwestreading
          - slamanna-com
          - slamanna-food
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build local test image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64
          load: true
          push: false
          tags: local/runner-${{ matrix.target }}:test
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Smoke test
        run: ./scripts/smoke-test.sh local/runner-${{ matrix.target }}:test ${{ matrix.target }}

      - name: Scan fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/runner-${{ matrix.target }}:test
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  publish:
    name: Publish ${{ matrix.target }}
    if: github.event_name != 'pull_request'
    needs: build-test
    runs-on: rapture-runnerimages
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - apogee
          - matchexec
          - tonysofwestreading
          - slamanna-com
          - slamanna-food
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:run-${{ github.run_id }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  runner-freshness:
    name: Check runner freshness
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: rapture-runnerimages
    steps:
      - uses: actions/checkout@v6
      - run: ./scripts/check-runner-freshness.sh
